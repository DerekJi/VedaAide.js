name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - infra/**
      - .github/workflows/deploy-infrastructure.yml
  pull_request:
    branches:
      - main
    paths:
      - infra/**
      - .github/workflows/deploy-infrastructure.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment (dev/staging/prod)
        required: true
        default: prod
        type: choice
        options:
          - dev
          - staging
          - prod
      container_image:
        description: Container image URI
        required: true
        default: ghcr.io/DerekJi/vedaaide-js:latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ENABLE_ACTUAL_DEPLOYMENT: "false"  # Only deploy on main branch pushes, not PRs

jobs:
  deploy-infrastructure:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    environment: infrastructure
    # Only run on main branch or manual trigger, not on PRs
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Bicep syntax
        run: |
          echo "Checking Bicep template syntax..."
          if [ -f infra/main.bicep ]; then
            echo "✅ Bicep template found"
            wc -l infra/main.bicep
          else
            echo "❌ Bicep template not found"
            exit 1
          fi

      - name: Verify parameters file
        run: |
          echo "Checking parameters template..."
          if [ -f infra/deploy.parameters.json ]; then
            echo "✅ Parameters file found"
            jq '.' infra/deploy.parameters.json > /dev/null && echo "✅ Valid JSON"
          fi

      - name: Info - PR detected, skipping actual deployment
        if: github.event_name == 'pull_request'
        run: |
          echo "ℹ️ Pull Request detected"
          echo "✅ Bicep validation passed - deployment would proceed on merge to main"

      - name: Azure login
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          # Set subscription directly (Azure login already sets it, but being explicit)
          az account set --subscription "02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0"
          echo "✅ Subscription set to: 02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0"

      - name: Create resource group
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          az group create --name vedaaide-prod-rg --location australiaeast || true

      - name: Create parameters file
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          jq -n '{
            "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "environment": { "value": "prod" },
              "containerImage": { "value": "ghcr.io/DerekJi/vedaaide-js:latest" },
              "cosmosDbResourceGroup": { "value": "dev-dj-sbi-customer_group" },
              "cosmosDbAccountName": { "value": "vedaaide" },
              "openAiResourceGroup": { "value": "dev-dj-sbi-customer_group" },
              "openAiAccountName": { "value": "dev-dj-open-ai" },
              "apiKey": { "value": "" },
              "adminApiKey": { "value": "" },
              "allowedOrigins": { "value": "*" }
            }
          }' > infra/deploy.parameters.json

          echo "Parameters created:"
          cat infra/deploy.parameters.json

      - name: Validate Bicep
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          az deployment group validate \
            --resource-group vedaaide-prod-rg \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json

      - name: Deploy Bicep
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          az deployment group create \
            --resource-group vedaaide-prod-rg \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json

      - name: Get outputs
        if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && success()
        run: |
          az deployment group list \
            --resource-group vedaaide-prod-rg \
            --query "sort_by(@, &properties.timestamp)[-1].properties.outputs" \
            --output json

      - name: Grant Managed Identity access to Document Intelligence
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          # Get the identity principal ID from the deployment output or by querying the resource
          IDENTITY_NAME="vedaaide-prod-identity"
          IDENTITY_RG="vedaaide-prod-rg"
          IDENTITY_ID=$(az identity show --resource-group "$IDENTITY_RG" --name "$IDENTITY_NAME" --query "principalId" -o tsv 2>/dev/null || echo "")

          if [ -z "$IDENTITY_ID" ]; then
            echo "⚠️ Could not find Managed Identity - skipping Document Intelligence role assignment"
          else
            echo "✅ Granting Managed Identity ($IDENTITY_ID) 'Cognitive Services User' role on Document Intelligence..."
            az role assignment create \
              --assignee "$IDENTITY_ID" \
              --role "a97b65f3-24c7-4dac-a4e0-291a4c8dc61e" \
              --scope "/subscriptions/02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0/resourceGroups/dev-dj-sbi-customer_group/providers/Microsoft.CognitiveServices/accounts/vedadoc" \
              2>/dev/null || echo "ℹ️ Role assignment already exists or skipped"
            echo "✅ Document Intelligence access granted"
          fi

      - name: Deployment summary
        if: always()
        run: echo "✅ Infrastructure workflow completed with status - ${{ job.status }}"
