name: Basic Test

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Hello
        run: echo "Hello from GitHub Actions!"
      - name: Check OS
        run: echo "OS: $(uname -a)"
      - name: Status
        run: echo "Workflows in this repo should now work"
