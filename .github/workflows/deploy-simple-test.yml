name: Simple Deployment Test

on:
  push:
    branches:
      - main
      - infra/**
    paths:
      - .github/workflows/deploy-simple-test.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Azure Connectivity Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Show subscription
        run: az account show --output table

      - name: List resource groups
        run: az group list --output table

      - name: Check vedaaide-prod-rg
        run: az group exists --name vedaaide-prod-rg --output json

      - name: Summary
        if: always()
        run: echo "Azure connectivity test completed"
