name: Simple Deployment Test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-simple-test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Test 1: Account info
        run: |
          echo "Checking account..."
          az account show --query "{id, name}" -o json
          
      - name: Test 2: List resource groups
        run: |
          echo "Listing resource groups..."
          az group list --query "[].name" -o json | head -20
          
      - name: Test 3: Check target resource group
        run: |
          RESOURCE_GROUP="vedaaide-prod-rg"
          echo "Checking resource group: $RESOURCE_GROUP"
          az group show --name "$RESOURCE_GROUP" --query "{name, location, id}" -o json 2>&1 || echo "Resource group not found"
          
      - name: Test 4: List Cosmos DB accounts
        run: |
          echo "Listing Cosmos DB accounts..."
          az cosmosdb database-accounts list --query "[].{name, endpoint: documentEndpoint}" -o json 2>&1 | head -20 || echo "No Cosmos accounts or API error"

      - name: Deployment summary
        if: always()
        run: |
          echo "✅ Simple test completed successfully"
          echo "Status: ${{ job.status }}"
