name: Test & Verify

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint, type-check, unit + integration tests ─────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Unit & integration tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: file:./test.db

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ── Job 2: E2E tests (Playwright) ─────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./e2e-test.db

      - name: Build Next.js application
        run: npm run build
        env:
          DATABASE_URL: file:./e2e-test.db
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_EMBEDDING_MODEL: bge-m3
          OLLAMA_CHAT_MODEL: qwen:7b-chat

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: production
          DATABASE_URL: file:./e2e-test.db
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_EMBEDDING_MODEL: bge-m3
          OLLAMA_CHAT_MODEL: qwen:7b-chat

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Job 3: Build Docker image ──────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, e2e]

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (test only on PRs)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image (on push to branch)
        id: push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Deploy to Staging (develop branch only) ────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://vedaaide-staging.azurecontainerapps.io

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (Staging)
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: vedaaide-rg
          containerAppName: vedaaide-staging
          imageToDeploy: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Smoke test staging
        run: |
          sleep 30
          curl --fail https://vedaaide-staging.azurecontainerapps.io/api/health || exit 1

  # ── Job 5: Deploy to Production (main branch only) ─────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://vedaaide.azurecontainerapps.io

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps (Production)
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: vedaaide-rg
          containerAppName: vedaaide-prod
          imageToDeploy: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Smoke test production
        run: |
          sleep 30
          curl --fail https://vedaaide.azurecontainerapps.io/api/health || exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployed commit ${{ github.sha }} to production"
          echo "Status: ${{ job.status }}"
