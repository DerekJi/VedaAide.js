name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - infra/**
      - .github/workflows/deploy-infrastructure.yml
  pull_request:
    branches:
      - main
    paths:
      - infra/**
      - .github/workflows/deploy-infrastructure.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment (dev/staging/prod)
        required: true
        default: prod
        type: choice
        options:
          - dev
          - staging
          - prod
      container_image:
        description: Container image URI
        required: true
        default: ghcr.io/DerekJi/vedaaide-js:latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # TEMPORARY: Set to 'true' to enable actual deployment. Set to 'false' to disable after verification.
  ENABLE_ACTUAL_DEPLOYMENT: "true"

jobs:
  deploy-infrastructure:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    environment: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Bicep syntax
        run: |
          echo "Checking Bicep template syntax..."
          if [ -f infra/main.bicep ]; then
            echo "✅ Bicep template found"
            wc -l infra/main.bicep
          else
            echo "❌ Bicep template not found"
            exit 1
          fi

      - name: Verify parameters file
        run: |
          echo "Checking parameters template..."
          if [ -f infra/deploy.parameters.json ]; then
            echo "✅ Parameters file found"
            jq '.' infra/deploy.parameters.json > /dev/null && echo "✅ Valid JSON"
          fi

      - name: Run deployment
        if: github.event_name != 'pull_request' && env.ENABLE_ACTUAL_DEPLOYMENT == 'true'
        run: echo "✅ Proceeding with actual deployment (ENABLE_ACTUAL_DEPLOYMENT=true)"

      - name: Block deployment if disabled
        if: github.event_name != 'pull_request' && env.ENABLE_ACTUAL_DEPLOYMENT != 'true'
        run: |
          echo "⚠️ Deployment is currently disabled (ENABLE_ACTUAL_DEPLOYMENT=${{ env.ENABLE_ACTUAL_DEPLOYMENT }})"
          exit 1

      - name: Azure login
        if: github.event_name != 'pull_request' || env.ENABLE_ACTUAL_DEPLOYMENT == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        if: github.event_name != 'pull_request' || env.ENABLE_ACTUAL_DEPLOYMENT == 'true'
        run: |
          # Set subscription directly (Azure login already sets it, but being explicit)
          az account set --subscription "02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0"
          echo "✅ Subscription set to: 02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0"

      - name: Create resource group
        if: github.event_name != 'pull_request' || env.ENABLE_ACTUAL_DEPLOYMENT == 'true'
        run: |
          az group create --name vedaaide-prod-rg --location australiaeast || true

      - name: Create parameters file
        run: |
          jq -n '{
            "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "environment": { "value": "prod" },
              "containerImage": { "value": "ghcr.io/DerekJi/vedaaide-js:latest" },
              "azureOpenAiEndpoint": { "value": "https://dev-dj-open-ai.openai.azure.com/" },
              "cosmosDbEndpoint": { "value": "https://vedaaide.documents.azure.com:443/" },
              "apiKey": { "value": "" },
              "adminApiKey": { "value": "" },
              "allowedOrigins": { "value": "*" }
            }
          }' > infra/deploy.parameters.json

          echo "Parameters created:"
          cat infra/deploy.parameters.json

      - name: Validate Bicep
        if: github.event_name != 'pull_request' || env.ENABLE_ACTUAL_DEPLOYMENT == 'true'
        run: |
          az deployment group validate \
            --resource-group vedaaide-prod-rg \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json

      - name: Deploy Bicep
        if: github.event_name != 'pull_request' || env.ENABLE_ACTUAL_DEPLOYMENT == 'true'
        run: |
          az deployment group create \
            --resource-group vedaaide-prod-rg \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json

      - name: Get outputs
        if: (github.event_name != 'pull_request' || env.ENABLE_ACTUAL_DEPLOYMENT == 'true') && success()
        run: |
          az deployment group list \
            --resource-group vedaaide-prod-rg \
            --query "sort_by(@, &properties.timestamp)[-1].properties.outputs" \
            --output json

      - name: Deployment summary
        if: always()
        run: echo "Deployment workflow completed with status - ${{ job.status }}"
