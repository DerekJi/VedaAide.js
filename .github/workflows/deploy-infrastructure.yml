name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infrastructure.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment (dev/staging/prod)"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod
      container_image:
        description: "Container image URI (e.g., ghcr.io/org/image:tag)"
        required: true
        default: "ghcr.io/DerekJi/vedaaide-js:latest"

jobs:
  deploy-infrastructure:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    environment: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: |
          az account set --subscription "02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0"
          az account show

      - name: Create resource group
        run: |
          RESOURCE_GROUP="vedaaide-prod-rg"
          LOCATION="australiaeast"
          if az group exists --name "$RESOURCE_GROUP" | grep -q false; then
            echo "Creating resource group: $RESOURCE_GROUP"
            az group create --name "$RESOURCE_GROUP" --location "$LOCATION"
          else
            echo "Resource group already exists: $RESOURCE_GROUP"
          fi

      - name: Create deployment parameters file
        run: |
          # Use manual inputs if available (workflow_dispatch), otherwise use defaults
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          [ -z "$ENVIRONMENT" ] && ENVIRONMENT="prod"
          
          CONTAINER_IMAGE="${{ github.event.inputs.container_image }}"
          [ -z "$CONTAINER_IMAGE" ] && CONTAINER_IMAGE="ghcr.io/DerekJi/vedaaide-js:latest"
          
          echo "Deploying with:"
          echo "  Environment: $ENVIRONMENT"
          echo "  Container Image: $CONTAINER_IMAGE"
          
          cat > infra/deploy.parameters.json <<'EOF'
{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": { "value": "australiaeast" },
    "environment": { "value": "ENVIRONMENT_PLACEHOLDER" },
    "containerImage": { "value": "CONTAINER_PLACEHOLDER" },
    "azureOpenAiEndpoint": { "value": "https://dev-dj-open-ai.openai.azure.com/" },
    "cosmosDbEndpoint": { "value": "https://vedaaide.documents.azure.com:443/" },
    "apiKey": { "value": "" },
    "adminApiKey": { "value": "" },
    "allowedOrigins": { "value": "*" }
  }
}
EOF
          
          # Replace placeholders with actual values
          sed -i "s|ENVIRONMENT_PLACEHOLDER|$ENVIRONMENT|g" infra/deploy.parameters.json
          sed -i "s|CONTAINER_PLACEHOLDER|$CONTAINER_IMAGE|g" infra/deploy.parameters.json
          
          echo "✅ Parameters file created"
          cat infra/deploy.parameters.json

      - name: Validate Bicep template
        run: |
          az deployment group validate \
            --resource-group vedaaide-prod-rg \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json \
            --verbose
          echo "✅ Bicep validation succeeded"

      - name: Deploy Bicep template
        run: |
          RESOURCE_GROUP="vedaaide-prod-rg"
          
          echo "🚀 Starting Bicep deployment..."
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json \
            --output jsonc \
            --verbose || (echo "❌ Deployment failed"; exit 1)
          
          echo "✅ Bicep deployment completed"

      - name: Get deployment outputs
        if: success()
        run: |
          RESOURCE_GROUP="vedaaide-prod-rg"
          
          echo "=== Retrieving deployment information ==="
          
          # Get the latest deployment
          DEPLOYMENT=$(az deployment group list \
            --resource-group "$RESOURCE_GROUP" \
            --query "sort_by(@, &properties.timestamp)[-1]" \
            -o json)
          
          echo "$DEPLOYMENT" | jq '.'
          
          DEPLOYMENT_NAME=$(echo "$DEPLOYMENT" | jq -r '.name')
          echo "Latest deployment: $DEPLOYMENT_NAME"

      - name: List container apps
        if: success()
        run: |
          RESOURCE_GROUP="vedaaide-prod-rg"
          echo "=== Container Apps ==="
          az containerapp list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[].{name:name, state:properties.provisioningState, fqdn:properties.configuration.ingress.fqdn}" \
            -o table

      - name: Test health endpoints
        if: success()
        run: |
          echo "Waiting 30 seconds for container apps to be ready..."
          sleep 30

          RESOURCE_GROUP="vedaaide-prod-rg"
          FQDNS=$(az containerapp list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[].properties.configuration.ingress.fqdn" \
            -o tsv)

          if [ -z "$FQDNS" ]; then
            echo "No container apps found"
            exit 1
          fi

          for FQDN in $FQDNS; do
            echo "Testing health endpoint: https://$FQDN/api/health"
            curl -f -s "https://$FQDN/api/health" || echo "Health check not yet available"
          done

      - name: Deployment summary
        if: always()
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          [ -z "$ENVIRONMENT" ] && ENVIRONMENT="prod"
          
          CONTAINER_IMAGE="${{ github.event.inputs.container_image }}"
          [ -z "$CONTAINER_IMAGE" ] && CONTAINER_IMAGE="ghcr.io/DerekJi/vedaaide-js:latest"
          
          echo "=== Deployment Summary ==="
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Environment: $ENVIRONMENT"
          echo "Container Image: $CONTAINER_IMAGE"
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
