name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - infra/**
      - .github/workflows/deploy-infrastructure.yml
  pull_request:
    branches:
      - main
    paths:
      - infra/**
      - .github/workflows/deploy-infrastructure.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment (dev/staging/prod)
        required: true
        default: prod
        type: choice
        options:
          - dev
          - staging
          - prod
      container_image:
        description: Container image URI
        required: true
        default: ghcr.io/DerekJi/vedaaide-js:latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ENABLE_ACTUAL_DEPLOYMENT: "true"  # Deploy on PRs for testing in infra/devops branch

jobs:
  deploy-infrastructure:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    environment: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Bicep syntax
        run: |
          echo "Checking Bicep template syntax..."
          if [ -f infra/main.bicep ]; then
            echo "✅ Bicep template found"
            wc -l infra/main.bicep
          else
            echo "❌ Bicep template not found"
            exit 1
          fi

      - name: Verify parameters file
        run: |
          echo "Checking parameters template..."
          if [ -f infra/deploy.parameters.json ]; then
            echo "✅ Parameters file found"
            jq '.' infra/deploy.parameters.json > /dev/null && echo "✅ Valid JSON"
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure login and get subscription info
        run: |
          echo "✅ Step 1: Verifying Azure login..."
          az account show || exit 1
          echo "✅ Currently logged in account:"
          az account list --output table

      - name: Set Azure subscription
        run: |
          echo "✅ Step 2: Setting subscription..."
          az account set --subscription "02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0" || exit 1
          echo "✅ Subscription set to: 02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0"
          az account show

      - name: Create resource group
        run: |
          echo "✅ Step 3: Creating resource group..."
          az group create --name vedaaide-prod-rg --location australiaeast || {
            echo "⚠️ Resource group creation failed or already exists, continuing..."
          }
          echo "✅ Resource group ready"
          az group show --name vedaaide-prod-rg

      - name: Create parameters file
        run: |
          echo "✅ Step 4: Creating parameters file..."
          cat > infra/deploy.parameters.json << 'EOF'
          {
            "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "environment": { "value": "prod" },
              "containerImage": { "value": "ghcr.io/DerekJi/vedaaide-js:latest" },
              "cosmosDbResourceGroup": { "value": "dev-dj-sbi-customer_group" },
              "cosmosDbAccountName": { "value": "vedaaide" },
              "openAiResourceGroup": { "value": "dev-dj-sbi-customer_group" },
              "openAiAccountName": { "value": "dev-dj-open-ai" },
              "apiKey": { "value": "" },
              "adminApiKey": { "value": "" },
              "allowedOrigins": { "value": "*" }
            }
          }
          EOF
          
          echo "✅ Parameters file created:"
          cat infra/deploy.parameters.json

      - name: Validate parameters file
        run: |
          echo "✅ Step 5: Validating parameters file..."
          if ! jq . infra/deploy.parameters.json > /dev/null; then
            echo "❌ Invalid JSON in parameters file!"
            exit 1
          fi
          echo "✅ Parameters file is valid JSON"

      - name: Check referenced resources
        continue-on-error: true
        run: |
          echo "✅ Step 6: Checking referenced Azure resources..."
          echo "Checking CosmosDB account..."
          az cosmosdb show --name vedaaide --resource-group dev-dj-sbi-customer_group || echo "⚠️ CosmosDB account not found"
          echo "Checking OpenAI account..."
          az cognitiveservices account show --name dev-dj-open-ai --resource-group dev-dj-sbi-customer_group || echo "⚠️ OpenAI account not found"

      - name: Validate Bicep
        run: |
          echo "✅ Step 7: Validating Bicep template..."
          az deployment group validate \
            --resource-group vedaaide-prod-rg \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json \
            || {
              echo "❌ Bicep validation failed!"
              exit 1
            }
          echo "✅ Bicep template validation passed"

      - name: Deploy Bicep
        run: |
          echo "✅ Step 8: Starting Bicep deployment..."
          az deployment group create \
            --resource-group vedaaide-prod-rg \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json \
            || {
              echo "❌ Bicep deployment failed!"
              echo "Fetching deployment error details..."
              az deployment group list \
                --resource-group vedaaide-prod-rg \
                --query "sort_by(@, &properties.timestamp)[-1]" \
                --output json
              exit 1
            }
          echo "✅ Bicep deployment completed successfully"

      - name: Get outputs
        if: success()
        continue-on-error: true
        run: |
          echo "✅ Step 9: Fetching deployment outputs..."
          az deployment group list \
            --resource-group vedaaide-prod-rg \
            --query "sort_by(@, &properties.timestamp)[-1].properties.outputs" \
            --output json || echo "⚠️ Could not fetch outputs"

      - name: Grant Managed Identity access to Document Intelligence
        continue-on-error: true
        run: |
          echo "✅ Step 10: Configuring Managed Identity..."
          
          IDENTITY_NAME="vedaaide-prod-identity"
          IDENTITY_RG="vedaaide-prod-rg"
          
          echo "Looking for Managed Identity: $IDENTITY_NAME in $IDENTITY_RG..."
          IDENTITY_ID=$(az identity show --resource-group "$IDENTITY_RG" --name "$IDENTITY_NAME" --query "principalId" -o tsv 2>/dev/null || echo "")

          if [ -z "$IDENTITY_ID" ]; then
            echo "⚠️ Could not find Managed Identity - skipping Document Intelligence role assignment"
            echo "Note: This may be expected if the Bicep template doesn't create a managed identity"
          else
            echo "✅ Found Managed Identity: $IDENTITY_ID"
            echo "Attempting to grant 'Cognitive Services User' role on Document Intelligence..."
            az role assignment create \
              --assignee "$IDENTITY_ID" \
              --role "a97b65f3-24c7-4dac-a4e0-291a4c8dc61e" \
              --scope "/subscriptions/02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0/resourceGroups/dev-dj-sbi-customer_group/providers/Microsoft.CognitiveServices/accounts/vedadoc" \
              2>/dev/null && echo "✅ Role assignment successful" || echo "ℹ️ Role assignment skipped or already exists"
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "=========================================="
          echo "Deployment workflow completed"
          echo "Status: ${{ job.status }}"
          echo "=========================================="
