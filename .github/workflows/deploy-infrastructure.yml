name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment (dev/staging/prod)"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod
      container_image:
        description: "Container image URI (e.g., ghcr.io/org/image:tag)"
        required: true
        default: "ghcr.io/derekji/vedaaide-js:latest"
  pull_request:
    branches:
      - main
      - infra/devops
    paths:
      - infra/**
      - .github/workflows/deploy-infrastructure.yml

concurrency:
  group: deploy-infrastructure
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy-infrastructure:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    environment: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine deployment parameters
        id: params
        run: |
          # Use workflow_dispatch inputs if available, otherwise use defaults for PR
          ENVIRONMENT="${{ github.event.inputs.environment || 'prod' }}"
          CONTAINER_IMAGE="${{ github.event.inputs.container_image || 'ghcr.io/derekji/vedaaide-js:latest' }}"

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "container_image=$CONTAINER_IMAGE" >> $GITHUB_OUTPUT
          echo "ℹ️  Environment: $ENVIRONMENT"
          echo "ℹ️  Container Image: $CONTAINER_IMAGE"

      - name: Display trigger info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/derekji/vedaaide-js:latest

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: |
          az account set --subscription "02a35f91-5ef5-4ebb-9fdf-9143c7e5f3b0"
          az account show

      - name: Create resource group
        run: |
          RESOURCE_GROUP="dev-dj-sbi-customer_group"
          LOCATION="australiaeast"
          if az group exists --name "$RESOURCE_GROUP" | grep -q false; then
            echo "Creating resource group: $RESOURCE_GROUP"
            az group create --name "$RESOURCE_GROUP" --location "$LOCATION"
          else
            echo "Resource group already exists: $RESOURCE_GROUP"
          fi

      - name: Validate Bicep template
        run: |
          RESOURCE_GROUP="dev-dj-sbi-customer_group"
          echo "Validating Bicep template..."
          az deployment group validate \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json

      - name: Deploy Bicep template
        run: |
          RESOURCE_GROUP="dev-dj-sbi-customer_group"
          ENVIRONMENT="${{ steps.params.outputs.environment }}"
          CONTAINER_IMAGE="${{ steps.params.outputs.container_image }}"
          echo "Starting deployment..."
          echo "  Environment: $ENVIRONMENT"
          echo "  Container Image: $CONTAINER_IMAGE"
          echo "  Resource Group: $RESOURCE_GROUP"

          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json \
            --parameters \
              environment="$ENVIRONMENT" \
              containerImage="$CONTAINER_IMAGE" \
              azureOpenAiApiKey="${{ secrets.AZURE_OPENAI_API_KEY }}" \
            --output table

      - name: Get deployment outputs
        if: success()
        run: |
          RESOURCE_GROUP="dev-dj-sbi-customer_group"
          echo "=== Deployment Outputs ==="
          az deployment group list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[-1].{name:name, state:properties.provisioningState, timestamp:properties.timestamp}" \
            -o table

      - name: List container apps
        if: success()
        run: |
          RESOURCE_GROUP="dev-dj-sbi-customer_group"
          echo "=== Container Apps ==="
          az containerapp list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[].{name:name, state:properties.provisioningState, fqdn:properties.configuration.ingress.fqdn}" \
            -o table

      - name: Test health endpoints
        if: success()
        run: |
          echo "Waiting 30 seconds for container apps to be ready..."
          sleep 30

          RESOURCE_GROUP="dev-dj-sbi-customer_group"
          FQDNS=$(az containerapp list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[].properties.configuration.ingress.fqdn" \
            -o tsv)

          if [ -z "$FQDNS" ]; then
            echo "No container apps found"
            exit 1
          fi

          for FQDN in $FQDNS; do
            echo "Testing health endpoint: https://$FQDN/api/health"
            curl -f -s "https://$FQDN/api/health" || echo "Health check not yet available"
          done

      - name: Show deployment failure details
        if: failure()
        run: |
          echo "=== Deployment Failure Details ==="
          az deployment group operation list \
            --resource-group "dev-dj-sbi-customer_group" \
            --name main \
            --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceType, name:properties.targetResource.resourceName, error:properties.statusMessage}" \
            -o json || echo "(no operations found or deployment did not start)"

      - name: Deployment summary
        if: always()
        run: |
          echo "=== Deployment Summary ==="
          echo "Trigger: ${{ github.event_name }}"
          echo "Environment: ${{ steps.params.outputs.environment }}"
          echo "Container Image: ${{ steps.params.outputs.container_image }}"
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
