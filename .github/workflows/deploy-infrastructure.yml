name: Deploy Infrastructure

on:
  push:
    branches:
      - main
      - infra/**
    paths:
      - infra/**
      - .github/workflows/deploy-infrastructure.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment (dev/staging/prod)
        required: true
        default: prod
        type: choice
        options:
          - dev
          - staging
          - prod
      container_image:
        description: Container image URI
        required: true
        default: ghcr.io/DerekJi/vedaaide-js:latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-infrastructure:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    environment: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: |
          SUBSCRIPTION_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.subscriptionId')
          az account set --subscription "$SUBSCRIPTION_ID"

      - name: Create resource group
        run: |
          az group create --name vedaaide-prod-rg --location australiaeast || true

      - name: Create parameters file
        run: |
          jq -n '{
            "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "environment": { "value": "prod" },
              "containerImage": { "value": "ghcr.io/DerekJi/vedaaide-js:latest" },
              "azureOpenAiEndpoint": { "value": "https://dev-dj-open-ai.openai.azure.com/" },
              "cosmosDbEndpoint": { "value": "https://vedaaide.documents.azure.com:443/" },
              "apiKey": { "value": "" },
              "adminApiKey": { "value": "" },
              "allowedOrigins": { "value": "*" }
            }
          }' > infra/deploy.parameters.json
          
          echo "Parameters created:"
          cat infra/deploy.parameters.json

      - name: Validate Bicep
        run: |
          az deployment group validate \
            --resource-group vedaaide-prod-rg \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group vedaaide-prod-rg \
            --template-file infra/main.bicep \
            --parameters @infra/deploy.parameters.json

      - name: Get outputs
        if: success()
        run: |
          az deployment group list \
            --resource-group vedaaide-prod-rg \
            --query "sort_by(@, &properties.timestamp)[-1].properties.outputs" \
            --output json

      - name: Deployment summary
        if: always()
        run: echo "Deployment workflow completed with status - ${{ job.status }}"
